name: CI Security Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

env:
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/taskapp-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/taskapp-frontend

jobs:
  validate:
    name: Validate Code And Config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Secret scan with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: app/taskapp_backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        working-directory: app/taskapp_backend
        run: pytest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/taskapp_frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: app/taskapp_frontend
        run: npm ci

      - name: Build frontend
        working-directory: app/taskapp_frontend
        run: npm run build

      - name: Scan Kubernetes and Helm config with Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: kubernetes,helm
          quiet: true
          soft_fail: false

      - name: Scan repo config with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"

  build-scan-push:
    name: Build Scan And Push Images
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        run: docker build -t "$BACKEND_IMAGE:$IMAGE_TAG" -f app/taskapp_backend/Dockerfile app/taskapp_backend

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Push backend image
        run: docker push "$BACKEND_IMAGE:$IMAGE_TAG"

      - name: Build frontend image
        run: docker build -t "$FRONTEND_IMAGE:$IMAGE_TAG" -f app/taskapp_frontend/Dockerfile app/taskapp_frontend

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Push frontend image
        run: docker push "$FRONTEND_IMAGE:$IMAGE_TAG"

