name: CI Security Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "README.md"

  pull_request:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "README.md"

permissions:
  contents: write
  security-events: write

env:
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/taskapp-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/taskapp-frontend

jobs:
  validate:
    name: Validate Code And Config
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"
      DATABASE_NAME: testdb
      DATABASE_USER: test
      DATABASE_PASSWORD: test
      DATABASE_SSL_MODE: disable
      DATABASE_URL: postgresql://test:test@localhost:5432/testdb?sslmode=disable
      SECRET_KEY: test-secret-key

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Secret scan with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: app/taskapp_backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run backend tests
        working-directory: app/taskapp_backend
        run: pytest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/taskapp_frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: app/taskapp_frontend
        run: npm ci

      - name: Build frontend
        working-directory: app/taskapp_frontend
        run: npm run build

      - name: Scan Terraform, Kubernetes and Helm config with Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform,kubernetes,helm
          quiet: true
          soft_fail: true

      - name: Scan repo config with Trivy
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"

  build-scan-push:
    name: Build Scan And Push Images
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        run: docker build -t "$BACKEND_IMAGE:$IMAGE_TAG" -f app/taskapp_backend/Dockerfile app/taskapp_backend

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Push backend image
        run: docker push "$BACKEND_IMAGE:$IMAGE_TAG"

      - name: Build frontend image
        run: docker build -t "$FRONTEND_IMAGE:$IMAGE_TAG" -f app/taskapp_frontend/Dockerfile app/taskapp_frontend

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Push frontend image
        run: docker push "$FRONTEND_IMAGE:$IMAGE_TAG"

  update-helm-tags:
    name: Update Helm Image Tags For GitOps
    runs-on: ubuntu-latest
    needs: build-scan-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Update Helm values image tags
        run: |
          python3 - <<'PY'
          from pathlib import Path

          tag = "${{ env.IMAGE_TAG }}"
          path = Path("helm/taskapp/values.yaml")

          lines = path.read_text().splitlines()
          output = []

          current_section = None
          in_image_block = False

          for line in lines:
              stripped = line.strip()
              indent = len(line) - len(line.lstrip())

              if indent == 0 and stripped in ("backend:", "frontend:"):
                  current_section = stripped.replace(":", "")
                  in_image_block = False
              elif indent == 0 and stripped.endswith(":"):
                  current_section = None
                  in_image_block = False

              if current_section in ("backend", "frontend") and indent == 2 and stripped == "image:":
                  in_image_block = True
              elif in_image_block and indent <= 2 and stripped != "image:":
                  in_image_block = False

              if current_section in ("backend", "frontend") and in_image_block and stripped.startswith("tag:"):
                  line = line[:indent] + f'tag: "{tag}"'

              output.append(line)

          path.write_text("\n".join(output) + "\n")
          PY

      - name: Commit updated Helm image tags
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git diff --quiet; then
            echo "No Helm tag changes detected."
          else
            git add helm/taskapp/values.yaml
            git commit -m "chore: update TaskApp image tags [skip ci]"
            git push
          fi
