apiVersion: kops.k8s.io/v1alpha2
kind: Cluster
metadata:
  name: k8s.oparatechstack.com
spec:
  api:
    loadBalancer:
      class: Network
      type: Public
  authorization:
    rbac: {}
  channel: stable
  cloudProvider: aws
  configBase: s3://taskapp-kops-state-opara/k8s.oparatechstack.com
  dnsZone: oparatechstack.com
  etcdClusters:
  - cpuRequest: 200m
    etcdMembers:
    - encryptedVolume: true
      instanceGroup: control-plane-eu-west-3a
      name: a
    manager:
      backupRetentionDays: 90
    memoryRequest: 100Mi
    name: main
  - cpuRequest: 100m
    etcdMembers:
    - encryptedVolume: true
      instanceGroup: control-plane-eu-west-3a
      name: a
    manager:
      backupRetentionDays: 90
    memoryRequest: 100Mi
    name: events
  iam:
    allowContainerRegistry: true
    legacy: false
  kubelet:
    anonymousAuth: false
  kubernetesApiAccess:
  - 102.93.7.230/32
  kubernetesVersion: 1.35.6
  masterPublicName: api.k8s.oparatechstack.com
  networkCIDR: 10.0.0.0/16
  networkID: vpc-0deca127104c85401
  networking:
    calico: {}
  nonMasqueradeCIDR: 100.64.0.0/10
  sshAccess:
  - 102.93.7.230/32
  subnets:
  - cidr: 10.0.11.0/24
    id: subnet-0614d8bc109a19977
    name: eu-west-3a
    type: Private
    zone: eu-west-3a
  - cidr: 10.0.12.0/24
    id: subnet-0719174ebf90528df
    name: eu-west-3b
    type: Private
    zone: eu-west-3b
  - cidr: 10.0.1.0/24
    id: subnet-0ece7927b1d60ff55
    name: utility-eu-west-3a
    type: Utility
    zone: eu-west-3a
  - cidr: 10.0.2.0/24
    id: subnet-040efa02f32932c6c
    name: utility-eu-west-3b
    type: Utility
    zone: eu-west-3b
  topology:
    dns:
      type: Public

---

apiVersion: kops.k8s.io/v1alpha2
kind: InstanceGroup
metadata:
  labels:
    kops.k8s.io/cluster: k8s.oparatechstack.com
  name: control-plane-eu-west-3a
spec:
  image: 099720109477/ubuntu/images/hvm-ssd-gp3/ubuntu-noble-24.04-amd64-server-20260610
  machineType: t3.medium
  maxSize: 1
  minSize: 1
  role: Master
  subnets:
  - eu-west-3a

---

apiVersion: kops.k8s.io/v1alpha2
kind: InstanceGroup
metadata:
  labels:
    kops.k8s.io/cluster: k8s.oparatechstack.com
  name: nodes-eu-west-3a
spec:
  image: 099720109477/ubuntu/images/hvm-ssd-gp3/ubuntu-noble-24.04-amd64-server-20260610
  machineType: t3.small
  maxSize: 1
  minSize: 1
  role: Node
  subnets:
  - eu-west-3a

---

apiVersion: kops.k8s.io/v1alpha2
kind: InstanceGroup
metadata:
  labels:
    kops.k8s.io/cluster: k8s.oparatechstack.com
  name: nodes-eu-west-3b
spec:
  image: 099720109477/ubuntu/images/hvm-ssd-gp3/ubuntu-noble-24.04-amd64-server-20260610
  machineType: t3.small
  maxSize: 1
  minSize: 1
  role: Node
  subnets:
  - eu-west-3b
