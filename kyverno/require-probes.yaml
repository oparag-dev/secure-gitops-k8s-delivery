apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-health-probes
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-liveness-readiness
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - taskapp
      validate:
        message: Containers must define liveness and readiness probes.
        pattern:
          spec:
            containers:
              - name: "*"
                livenessProbe: "?*"
                readinessProbe: "?*"
