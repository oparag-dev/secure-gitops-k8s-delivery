apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: taskapp-deployment-security
  annotations:
    policies.kyverno.io/title: TaskApp Deployment Security
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Deployment
spec:
  background: true
  rules:
    - name: require-versioned-images
      match:
        any:
          - resources:
              kinds:
                - Deployment
      validate:
        failureAction: Enforce
        message: "Container images must not use the latest tag."
        pattern:
          spec:
            template:
              spec:
                containers:
                  - image: "!*:latest"

    - name: require-service-account-token-disabled
      match:
        any:
          - resources:
              kinds:
                - Deployment
      validate:
        failureAction: Enforce
        message: "Service account token automounting must be disabled."
        pattern:
          spec:
            template:
              spec:
                automountServiceAccountToken: false

    - name: require-pod-security-context
      match:
        any:
          - resources:
              kinds:
                - Deployment
      validate:
        failureAction: Enforce
        message: "Pods must run as non-root and use RuntimeDefault seccomp."
        pattern:
          spec:
            template:
              spec:
                securityContext:
                  runAsNonRoot: true
                  seccompProfile:
                    type: RuntimeDefault

    - name: require-container-security-context
      match:
        any:
          - resources:
              kinds:
                - Deployment
      validate:
        failureAction: Enforce
        message: "Containers must disable privilege escalation and drop all capabilities."
        pattern:
          spec:
            template:
              spec:
                containers:
                  - securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL

    - name: require-resource-requests-and-limits
      match:
        any:
          - resources:
              kinds:
                - Deployment
      validate:
        failureAction: Enforce
        message: "Containers must define CPU and memory requests and limits."
        pattern:
          spec:
            template:
              spec:
                containers:
                  - resources:
                      requests:
                        cpu: "?*"
                        memory: "?*"
                      limits:
                        cpu: "?*"
                        memory: "?*"
