---
- name: Install local DevOps tools for secure GitOps project
  hosts: localhost
  connection: local
  become: true

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install required system packages
      ansible.builtin.apt:
        name:
          - curl
          - unzip
          - jq
          - ca-certificates
          - gnupg
          - git
          - python3
          - python3-pip
          - snapd
        state: present

    - name: Install Helm through Snap
      community.general.snap:
        name: helm
        classic: true
        state: present

    - name: Install kubectl through Snap
      community.general.snap:
        name: kubectl
        classic: true
        state: present

    - name: Confirm Helm installation
      ansible.builtin.command: helm version --short
      register: helm_version
      changed_when: false

    - name: Confirm kubectl installation
      ansible.builtin.command: kubectl version --client
      register: kubectl_version
      changed_when: false

    - name: Show installed tool versions
      ansible.builtin.debug:
        msg:
          - "{{ helm_version.stdout }}"
          - "{{ kubectl_version.stdout }}"